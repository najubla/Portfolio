<div class="project-card">
  <img *ngIf="project.image" [src]="project.image" alt="{{ project.title }}" class="project-image" />
  <h2>{{ project.title }}</h2>
  <p>{{ project.description }}</p>
  <p><strong>Stack:</strong> {{ project.stack.join(', ') }}</p>
  <div class="project-links">
    <a *ngIf="project.github" [href]="project.github" target="_blank">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" class="icon">
        <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38v-1.33C4 14.91 3.48 13.73 3.48 13.73c-.36-.91-.88-1.15-.88-1.15-.72-.49.05-.48.05-.48.8.06 1.23.82 1.23.82.71 1.21 1.86.86 2.32.66.07-.52.28-.86.5-1.06-2.22-.25-4.56-1.11-4.56-4.93 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02a9.56 9.56 0 012.5-.34c.85 0 1.7.11 2.5.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.83-2.34 4.68-4.57 4.92.29.25.54.73.54 1.48v2.19c0 .21.15.45.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
  
    <a *ngIf="project.kaggle" [href]="project.kaggle" target="_blank">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="icon">
        <path d="M20.47 3.22c-.5-.3-1.1-.4-1.67-.33a2.9 2.9 0 00-1.4.62L5.58 13.37a3.02 3.02 0 104.24 4.3l12.06-9.63c.47-.36.75-.9.8-1.5a2.84 2.84 0 00-1.22-2.32zm-14.1 13.8a1.05 1.05 0 111.49-1.48 1.05 1.05 0 01-1.49 1.48z"/>
      </svg>
      Kaggle
    </a>
  
    <a *ngIf="project.demo" [href]="project.demo" target="_blank">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="icon">
        <path d="M12 7a5 5 0 100 10 5 5 0 000-10zm0-5a1 1 0 011 1v1a1 1 0 01-2 0V3a1 1 0 011-1zm0 18a1 1 0 011 1v1a1 1 0 01-2 0v-1a1 1 0 011-1zm10-10a1 1 0 010 2h-1a1 1 0 010-2h1zM4 12a1 1 0 010 2H3a1 1 0 010-2h1zm14.66 6.66a1 1 0 010 1.41l-.7.7a1 1 0 01-1.41-1.41l.7-.7a1 1 0 011.41 0zM6.34 6.34a1 1 0 010 1.41L5.64 8.45a1 1 0 11-1.41-1.41l.7-.7a1 1 0 011.41 0zm12.02-1.41a1 1 0 011.41 0l.7.7a1 1 0 11-1.41 1.41l-.7-.7a1 1 0 010-1.41zM4.93 17.66a1 1 0 011.41 0l.7.7a1 1 0 11-1.41 1.41l-.7-.7a1 1 0 010-1.41z"/>

      Try App

  </div>
  
</div>
